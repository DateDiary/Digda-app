name: digda
description: 디그다 - 디지털 그룹 다이어리
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  go_router: ^14.0.0
  intl: ^0.20.2
  table_calendar: ^3.1.0
  flutter_svg: ^2.0.10+1
  image_picker: ^1.1.2
  world_holidays: ^2.0.1
  share_plus: ^10.1.4
  app_links: ^6.3.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/digda_icon.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/images/digda_icon.png"
  remove_alpha_ios: true

flutter:
  uses-material-design: true
  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
          weight: 400
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
  assets:
    - assets/icons/
    - assets/images/
    - assets/svg/
